<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>404 | Aegis Legal Chambers & Partners</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

/* ==========================
404 PAGE
========================== */

body{
    margin:0;
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
    linear-gradient(
    135deg,
    #0A1128,
    #1C2541
    );

    overflow:hidden;

    font-family:'Inter',sans-serif;
}

/* Animated Background */

body::before{
    content:"";

    position:absolute;

    width:600px;
    height:600px;

    background:
    rgba(197,160,89,.15);

    border-radius:50%;

    top:-200px;
    left:-150px;

    filter:blur(100px);

    animation:float1 8s ease-in-out infinite;
}

body::after{
    content:"";

    position:absolute;

    width:500px;
    height:500px;

    background:
    rgba(255,255,255,.08);

    border-radius:50%;

    bottom:-150px;
    right:-100px;

    filter:blur(120px);

    animation:float2 10s ease-in-out infinite;
}

/* Glass Card */

.error-box{

    position:relative;

    z-index:2;

    width:90%;
    max-width:800px;

    text-align:center;

    padding:60px;

    border-radius:30px;

    backdrop-filter:blur(18px);

    background:
    rgba(255,255,255,.06);

    border:
    1px solid rgba(255,255,255,.15);

    box-shadow:
    0 25px 60px rgba(0,0,0,.35);

    animation:
    cardUp 1.2s ease;
}

/* 404 Number */

.error-code{

    font-size:10rem;

    font-weight:800;

    line-height:1;

    color:#C5A059;

    font-family:'Playfair Display',serif;

    text-shadow:
    0 0 30px rgba(197,160,89,.4);

    animation:
    pulse404 3s infinite;
}

/* Icon */

.gavel{

    font-size:80px;

    margin-bottom:20px;

    animation:
    swing 3s ease-in-out infinite;
}

/* Title */

.error-title{

    color:#fff;

    font-size:2.7rem;

    margin:20px 0;
}

/* Description */

.error-text{

    color:#d8d8d8;

    line-height:2;

    font-size:1.05rem;

    margin-bottom:40px;
}

/* Button */

.home-btn{

    display:inline-block;

    padding:16px 40px;

    background:#C5A059;

    color:#fff;

    text-decoration:none;

    border-radius:50px;

    font-weight:600;

    transition:.4s;
}

.home-btn:hover{

    transform:
    translateY(-8px);

    box-shadow:
    0 15px 40px
    rgba(197,160,89,.45);
}

/* Floating Particles */

.particle{

    position:absolute;

    width:8px;
    height:8px;

    background:#C5A059;

    border-radius:50%;

    opacity:.3;

    animation:
    particleFloat 10s linear infinite;
}

/* Animations */

@keyframes cardUp{

    from{
        opacity:0;
        transform:
        translateY(80px);
    }

    to{
        opacity:1;
        transform:
        translateY(0);
    }
}

@keyframes pulse404{

    0%,100%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.05);
    }
}

@keyframes swing{

    0%,100%{
        transform:rotate(0deg);
    }

    50%{
        transform:rotate(10deg);
    }
}

@keyframes float1{

    0%,100%{
        transform:
        translateY(0);
    }

    50%{
        transform:
        translateY(60px);
    }
}

@keyframes float2{

    0%,100%{
        transform:
        translateY(0);
    }

    50%{
        transform:
        translateY(-60px);
    }
}

@keyframes particleFloat{

    from{
        transform:
        translateY(100vh);
    }

    to{
        transform:
        translateY(-100vh);
    }
}

/* Responsive */

@media(max-width:768px){

    .error-code{
        font-size:6rem;
    }

    .error-title{
        font-size:2rem;
    }

    .error-box{
        padding:40px 25px;
    }

}

</style>

</head>

<body>

<div class="error-box">

    <div class="gavel"></div>

    <div class="error-code">
        404
    </div>

    <h1 class="error-title">
        Page Not Found
    </h1>

    <p class="error-text">

        The page you are attempting to access may have been
        relocated, removed, renamed, or is temporarily unavailable.
        Please return to the main website and continue browsing
        Aegis Legal Chambers & Partners.

    </p>

    <a href="index.html" class="home-btn">
        Return to Homepage
    </a>

</div>

</body>
</html>
